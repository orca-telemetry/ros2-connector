name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Draft release tag name (e.g. dev-build)'
        required: false
        default: 'dev-build'

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            suffix: amd64
          - runner: ubuntu-24.04-arm
            suffix: arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Cache Zig installation
        id: cache-zig
        uses: actions/cache@v4
        with:
          path: ~/.zig
          key: zig-0.15.2-${{ matrix.suffix }}

      - name: Install Zig
        if: steps.cache-zig.outputs.cache-hit != 'true'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Add Zig to PATH (cache restore)
        if: steps.cache-zig.outputs.cache-hit == 'true'
        run: echo "$HOME/.zig" >> $GITHUB_PATH

      - name: Cache ROS Jazzy
        id: cache-ros
        uses: actions/cache@v4
        with:
          path: /opt/ros/jazzy
          key: ros-jazzy-${{ matrix.suffix }}-${{ hashFiles('.github/workflows/release.yaml') }}

      - name: Install ROS Jazzy
        if: steps.cache-ros.outputs.cache-hit != 'true'
        run: |
          sudo apt-get install -y software-properties-common curl
          sudo curl -sSL https://raw.githubusercontent.com/ros/rosdistro/master/ros.key \
            -o /usr/share/keyrings/ros-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/ros-archive-keyring.gpg] \
            http://packages.ros.org/ros2/ubuntu noble main" \
            | sudo tee /etc/apt/sources.list.d/ros2.list
          sudo apt-get update
          sudo apt-get install -y ros-jazzy-ros-base

      - name: Cache Zig build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/zig
            .zig-cache
          key: zig-build-${{ matrix.suffix }}-${{ hashFiles('src/**/*.zig', 'build.zig') }}
          restore-keys: |
            zig-build-${{ matrix.suffix }}-

      - name: Build
        run: zig build --release

      - name: Rename binary
        run: mv zig-out/bin/orca zig-out/bin/orca-${{ matrix.suffix }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          draft: ${{ github.event_name == 'workflow_dispatch' }}
          prerelease: ${{ github.event_name != 'workflow_dispatch' }}
          files: zig-out/bin/orca-${{ matrix.suffix }}
